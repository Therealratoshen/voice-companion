# ── Voice Companion — docker-compose ─────────────────────────────────────────
# Development + production setup
#
# Usage:
#   cp .env.example .env.production   # fill in your keys
#   docker-compose up -d              # production
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up  # dev

version: "3.9"

services:
  voice-companion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: voice-companion
    restart: unless-stopped
    ports:
      - "3456:3456"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3456
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    # Optional: mount for hot-reload in dev
    # volumes:
    #   - .:/app
    #   - /app/node_modules
